<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Streetlifting Tracker</title>
<style>
/* [AJOUT] Police Rajdhani (titres + valeurs numériques) */
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap');
/* [AJOUT] Palette Solo Leveling (violet / cyan néon) */
:root{
  --bg:#0a0a0f; --bg2:#0f0f1a; --bg3:#1a1a2e; --line:#262645;
  --txt:#e6edf3; --dim:#9aa0c0; --faint:#5a5a7a;
  --acc:#7B2FBE; --acc2:#9D50E0; --good:#00ff88; --warn:#d29922; --bad:#ff4d6d;
  --blue:#00D4FF; --purple:#bc8cff;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  padding-bottom:calc(120px + env(safe-area-inset-bottom));min-height:100vh;overscroll-behavior-y:contain}
#app{max-width:560px;margin:0 auto;padding:12px 12px 0}
h1{font-size:1.15rem;font-weight:800;letter-spacing:.3px}
h2{font-size:.95rem;font-weight:700;margin:18px 0 8px;color:var(--acc2)}
.sub{color:var(--dim);font-size:.78rem;margin-top:2px}
.card{background:var(--bg2);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
.card.tight{padding:10px 12px}
.row{display:flex;align-items:center;gap:8px}
.grow{flex:1}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
.chip{background:var(--bg3);border:1px solid var(--line);color:var(--dim);border-radius:99px;
  padding:6px 12px;font-size:.78rem;font-weight:600;cursor:pointer;white-space:nowrap}
.chip.on{background:var(--acc);border-color:var(--acc2);color:#fff;box-shadow:0 0 8px rgba(157,80,224,.5)}
.chip.done{border-color:var(--good);color:var(--good)}
.badge{font-size:.66rem;font-weight:700;padding:2px 8px;border-radius:99px;background:var(--bg3);color:var(--dim)}
.badge.acc{background:rgba(157,80,224,.15);color:var(--acc2)}
.badge.good{background:rgba(0,255,136,.12);color:var(--good)}
.badge.warn{background:rgba(210,153,34,.15);color:var(--warn)}
.badge.bad{background:rgba(255,77,109,.15);color:var(--bad)}
.badge.blue{background:rgba(0,212,255,.12);color:var(--blue)}
button{font-family:inherit;cursor:pointer;border:none}
.btn{background:var(--acc);color:#fff;font-weight:800;border-radius:12px;padding:13px 16px;
  font-size:.92rem;width:100%;margin-top:8px;box-shadow:0 0 12px rgba(123,47,190,.35)}
.btn.ghost{background:var(--bg3);color:var(--txt);border:1px solid var(--line);box-shadow:none}
.btn.small{width:auto;padding:8px 14px;font-size:.78rem;margin:0}
.btn.danger{background:rgba(255,77,109,.15);color:var(--bad);border:1px solid rgba(255,77,109,.4);box-shadow:none}
input,select,textarea{background:var(--bg3);border:1px solid var(--line);color:var(--txt);
  border-radius:10px;padding:10px;font-size:16px;font-family:inherit;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--acc)}
label{font-size:.74rem;color:var(--dim);font-weight:600;display:block;margin:10px 0 4px}
table{width:100%;border-collapse:collapse;font-size:.8rem}
th{text-align:left;color:var(--faint);font-size:.68rem;text-transform:uppercase;letter-spacing:.5px;
  padding:6px 6px;border-bottom:1px solid var(--line)}
td{padding:8px 6px;border-bottom:1px solid rgba(38,38,69,.55);vertical-align:top}
tr:last-child td{border-bottom:none}
/* ===== exercise / set rows ===== */
.ex{border-top:1px solid var(--line);padding:11px 0}
.ex:first-child{border-top:none;padding-top:2px}
.ex-name{font-weight:700;font-size:.92rem}
.ex-rx{color:var(--acc2);font-weight:700;font-size:.84rem;white-space:nowrap}
.ex-note{color:var(--dim);font-size:.74rem;margin-top:3px;line-height:1.35}
.sets{margin-top:8px;display:flex;flex-direction:column;gap:6px}
.set{display:grid;grid-template-columns:26px 1fr 1fr 1fr 42px;gap:6px;align-items:center}
.set .n{color:var(--faint);font-size:.74rem;font-weight:700;text-align:center}
.set input{padding:8px 6px;text-align:center;font-size:15px;border-radius:9px}
.set input::placeholder{color:var(--faint)}
.ck{width:42px;height:38px;border-radius:9px;background:var(--bg3);border:1px solid var(--line);
  color:var(--faint);font-size:1rem;font-weight:800}
.ck.on{background:var(--good);border-color:var(--good);color:#06150a}
.set-head{display:grid;grid-template-columns:26px 1fr 1fr 1fr 42px;gap:6px;
  font-size:.62rem;color:var(--faint);text-transform:uppercase;letter-spacing:.4px;text-align:center;margin-top:8px}
/* ===== bottom nav ===== */
nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,15,.97);border-top:1px solid var(--line);
  display:flex;justify-content:space-around;padding:6px 4px calc(6px + env(safe-area-inset-bottom));
  backdrop-filter:blur(12px);z-index:50}
nav button{background:none;color:var(--faint);font-size:.62rem;font-weight:700;display:flex;
  flex-direction:column;align-items:center;gap:2px;padding:4px 10px;border-radius:10px;flex:1;max-width:90px}
nav button .ic{font-size:1.25rem}
nav button.on{color:var(--acc)}
/* ===== timer bar ===== */
#timerbar{position:fixed;left:0;right:0;bottom:calc(58px + env(safe-area-inset-bottom));z-index:49;
  display:none;justify-content:center;pointer-events:none}
#timerbar .inner{pointer-events:auto;background:var(--bg3);border:1px solid var(--acc);border-radius:99px;
  display:flex;align-items:center;gap:10px;padding:8px 14px;box-shadow:0 6px 24px rgba(0,0,0,.5);margin:0 12px}
#timerbar .t{font-size:1.25rem;font-weight:800;font-variant-numeric:tabular-nums;color:var(--acc2);min-width:64px;text-align:center}
#timerbar button{background:var(--bg2);border:1px solid var(--line);color:var(--txt);border-radius:99px;
  width:34px;height:34px;font-size:.8rem;font-weight:700}
/* ===== modal ===== */
#modal{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;display:none;align-items:flex-end;justify-content:center}
#modal .box{background:var(--bg2);border:1px solid var(--line);border-radius:18px 18px 0 0;width:100%;max-width:560px;
  padding:18px 16px calc(18px + env(safe-area-inset-bottom));max-height:85vh;overflow-y:auto}
canvas{width:100%;height:auto;display:block}
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.stat{background:var(--bg3);border-radius:12px;padding:10px}
.stat .v{font-size:1.25rem;font-weight:800;color:var(--acc2)}
.stat .l{font-size:.66rem;color:var(--dim);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
.hero{background:linear-gradient(135deg,#16162e,#0f0f1a);border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:12px}
.prog-track{height:6px;background:var(--bg3);border-radius:99px;margin-top:10px;overflow:hidden}
/* [AJOUT] effet néon sur les barres de progression */
.prog-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:99px;
  box-shadow:0 0 10px var(--acc2),0 0 22px rgba(157,80,224,.45)}
details{border-top:1px solid var(--line)}
details summary{padding:11px 0;cursor:pointer;list-style:none;display:flex;align-items:center;gap:8px}
details summary::-webkit-details-marker{display:none}
.muted{color:var(--dim);font-size:.8rem;line-height:1.45}
.checkrow{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-top:1px solid rgba(38,38,69,.55);cursor:pointer}
.checkrow .box2{width:22px;height:22px;border-radius:6px;border:2px solid var(--line);flex-shrink:0;display:flex;
  align-items:center;justify-content:center;font-size:.8rem;color:#06150a;font-weight:900;margin-top:1px}
.checkrow.on .box2{background:var(--good);border-color:var(--good)}
.checkrow.on .tx{color:var(--dim);text-decoration:line-through}
.pill-input{display:flex;gap:8px;align-items:center}
.pill-input input{text-align:center}
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--good);
  color:var(--txt);padding:10px 18px;border-radius:99px;font-size:.82rem;font-weight:600;z-index:200;
  box-shadow:0 6px 20px rgba(0,0,0,.5);display:none;white-space:nowrap}
.lift-chip{display:flex;flex-direction:column;align-items:center;gap:1px;min-width:0;flex:1}
.lift-chip b{font-size:.92rem;white-space:nowrap}
/* [AJOUT] ===== Solo Leveling : police, HUD de rang, streak, RANK UP ===== */
h1,h2,.stat .v,#timerbar .t,.ex-rx,.lift-chip b{font-family:'Rajdhani',-apple-system,sans-serif;letter-spacing:.5px}
.rank-hud{position:relative;background:linear-gradient(135deg,rgba(123,47,190,.14),rgba(0,212,255,.05)),var(--bg2);
  border:1px solid rgba(157,80,224,.5);border-radius:10px;padding:14px;margin-bottom:12px;
  box-shadow:0 0 16px rgba(123,47,190,.25),inset 0 0 28px rgba(123,47,190,.07)}
.rank-hud::before,.rank-hud::after{content:'';position:absolute;width:14px;height:14px;border:2px solid var(--blue);opacity:.85}
.rank-hud::before{top:-1px;left:-1px;border-right:none;border-bottom:none;border-radius:10px 0 0 0}
.rank-hud::after{bottom:-1px;right:-1px;border-left:none;border-top:none;border-radius:0 0 10px 0}
.rank-badge2{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.9rem;width:54px;height:54px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;border:2px solid currentColor;border-radius:8px;
  background:rgba(0,0,0,.35);text-shadow:0 0 12px currentColor;box-shadow:0 0 12px rgba(157,80,224,.45),inset 0 0 12px rgba(157,80,224,.2)}
.rank-label{font-size:.62rem;letter-spacing:2px;color:var(--blue);text-transform:uppercase;font-weight:700}
.rank-total{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.35rem;line-height:1.2}
.streak-pill{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.05rem;white-space:nowrap;
  background:rgba(0,212,255,.08);border:1px solid rgba(0,212,255,.4);border-radius:99px;padding:6px 12px;
  box-shadow:0 0 10px rgba(0,212,255,.25)}
.rank-track{height:8px;background:rgba(0,0,0,.45);border:1px solid var(--line);border-radius:99px;margin-top:12px;overflow:hidden}
.rank-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--blue));border-radius:99px;
  box-shadow:0 0 10px var(--blue),0 0 20px rgba(0,212,255,.5)}
.rank-next{font-size:.7rem;color:var(--dim);margin-top:6px;letter-spacing:.4px}
#rankup{position:fixed;inset:0;z-index:300;display:none;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(6,4,14,.93);text-align:center;padding:20px}
#rankup.show{display:flex;animation:ruFlash .9s ease-out}
#rankup .ru-txt{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:2rem;letter-spacing:6px;color:var(--blue);
  white-space:nowrap;text-shadow:0 0 18px var(--blue),0 0 40px var(--blue);animation:ruPop .7s cubic-bezier(.2,1.6,.4,1)}
#rankup .ru-rank{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:7rem;line-height:1;margin-top:10px;
  text-shadow:0 0 24px currentColor,0 0 60px currentColor;animation:ruPop .9s cubic-bezier(.2,1.6,.4,1)}
#rankup .ru-sub{color:var(--dim);font-size:.78rem;margin-top:16px;letter-spacing:1px}
@keyframes ruFlash{0%{background:rgba(157,80,224,.9)}30%{background:rgba(0,212,255,.35)}100%{background:rgba(6,4,14,.93)}}
@keyframes ruPop{0%{transform:scale(2.6);opacity:0}60%{opacity:1}100%{transform:scale(1);opacity:1}}
/* [AJOUT] ===== Éclairs violets Solo Leveling ===== */
body::before{content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:radial-gradient(ellipse 60% 40% at 50% -5%,rgba(123,47,190,.22),transparent 70%),
             radial-gradient(ellipse 40% 30% at 85% 100%,rgba(0,212,255,.07),transparent 70%);
  animation:auraPulse 6s ease-in-out infinite}
@keyframes auraPulse{0%,100%{opacity:.7}50%{opacity:1}}
.bolt{position:absolute;pointer-events:none;filter:drop-shadow(0 0 6px var(--purple)) drop-shadow(0 0 14px rgba(157,80,224,.8))}
.bolt path{fill:none;stroke:var(--purple);stroke-width:2.5;stroke-linejoin:round}
.bolt.flicker{animation:boltFlick 3.2s infinite}
.bolt.flicker.b2{animation-delay:1.1s;animation-duration:4.1s}
@keyframes boltFlick{0%,86%,91%,96%{opacity:0}88%,93%,100%{opacity:1}89%,94%{opacity:.25}}
.rank-hud{overflow:visible}
#rankup .ru-bolt{position:absolute;filter:drop-shadow(0 0 10px var(--purple)) drop-shadow(0 0 30px var(--acc))}
#rankup .ru-bolt path{fill:none;stroke:#cfa6ff;stroke-width:4;stroke-linejoin:round}
#rankup.show .ru-bolt{animation:ruBolt .8s ease-out both}
@keyframes ruBolt{0%{opacity:0;transform:scaleY(.2);transform-origin:top}12%{opacity:1;transform:scaleY(1)}
  20%{opacity:.3}28%{opacity:1}60%{opacity:.8}100%{opacity:0}}
#rankup .ru-quote{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:.95rem;color:var(--purple);
  margin-top:14px;letter-spacing:1.5px;text-shadow:0 0 10px rgba(157,80,224,.8);font-style:italic}
.shadow-soldier{position:absolute;bottom:0;right:6px;font-size:2.4rem;opacity:.18;pointer-events:none;
  filter:drop-shadow(0 0 8px var(--acc));animation:soldierFloat 5s ease-in-out infinite}
@keyframes soldierFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.sl-eyes{display:inline-block;animation:eyesGlow 2.5s ease-in-out infinite}
@keyframes eyesGlow{0%,100%{filter:drop-shadow(0 0 2px var(--blue))}50%{filter:drop-shadow(0 0 9px var(--blue)) drop-shadow(0 0 16px var(--acc2))}}
/* [AJOUT] ===== Fond plein écran : Monarque des Ombres ===== */
#bgart{position:fixed;inset:0;z-index:-2;pointer-events:none;background-repeat:no-repeat;
  background-position:center 78%;background-size:min(100vw,520px) auto;
  animation:bgBreath 8s ease-in-out infinite;filter:drop-shadow(0 0 50px rgba(123,47,190,.5))}
#bgart.custom{background-size:cover;background-position:center 20%;opacity:.6;animation:none;filter:none}
#bgveil{position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:linear-gradient(180deg,rgba(10,10,15,.78) 0%,rgba(10,10,15,.42) 30%,rgba(10,10,15,.36) 60%,rgba(10,10,15,.8) 100%)}
@keyframes bgBreath{0%,100%{opacity:.75;transform:scale(1)}50%{opacity:.95;transform:scale(1.02)}}
/* cartes translucides pour laisser vivre le fond */
.card{background:rgba(15,15,26,.62);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
.hero{background:linear-gradient(135deg,rgba(22,22,46,.68),rgba(15,15,26,.6));backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px)}
.rank-hud{background:linear-gradient(135deg,rgba(123,47,190,.18),rgba(0,212,255,.05)),rgba(15,15,26,.8);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
/* particules d'ombre flottantes */
.mote{position:fixed;bottom:-12px;border-radius:50%;background:var(--purple);pointer-events:none;z-index:-1;
  box-shadow:0 0 8px var(--acc2),0 0 16px rgba(157,80,224,.6);animation:moteRise linear infinite;opacity:0}
@keyframes moteRise{0%{transform:translateY(0);opacity:0}10%{opacity:.7}90%{opacity:.4}100%{transform:translateY(-105vh);opacity:0}}
/* [AJOUT] ===== Rank-up v2 : onde de choc, étincelles, secousse ===== */
.ru-wave{position:absolute;left:50%;top:50%;width:10px;height:10px;border-radius:50%;border:3px solid var(--blue);
  transform:translate(-50%,-50%);opacity:0;pointer-events:none}
#rankup.show .ru-wave{animation:ruWave 1.1s ease-out .15s 2}
@keyframes ruWave{0%{width:10px;height:10px;opacity:.9;border-color:#cfa6ff}
  100%{width:140vmax;height:140vmax;opacity:0;border-color:var(--blue)}}
.ru-spark{position:absolute;left:50%;top:50%;width:5px;height:5px;border-radius:50%;background:var(--purple);
  box-shadow:0 0 8px var(--acc2),0 0 18px var(--blue);opacity:0;pointer-events:none}
#rankup.show .ru-spark{animation:ruSpark 1.3s cubic-bezier(.1,.8,.3,1) both}
@keyframes ruSpark{0%{transform:translate(-50%,-50%);opacity:1}
  100%{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(.3);opacity:0}}
@keyframes ruShake{0%,100%{transform:none}20%{transform:translate(-6px,3px)}40%{transform:translate(5px,-4px)}
  60%{transform:translate(-4px,-3px)}80%{transform:translate(3px,4px)}}
body.shake #app{animation:ruShake .45s linear}
/* [AJOUT] ===== Thème MONARQUE (semaine 7 — boss fight) ===== */
body.monarch{--acc:#a01030;--acc2:#FF2D55;--purple:#ff7d92;--blue:#FF9F43}
body.monarch #bgveil{background:linear-gradient(180deg,rgba(20,4,8,.82) 0%,rgba(20,4,8,.5) 30%,rgba(15,4,8,.45) 60%,rgba(18,3,8,.85) 100%)}
body.monarch::before{background:radial-gradient(ellipse 60% 40% at 50% -5%,rgba(180,18,46,.3),transparent 70%),
  radial-gradient(ellipse 40% 30% at 85% 100%,rgba(255,159,67,.08),transparent 70%)}
body.monarch .rank-hud{border-color:rgba(255,45,85,.55);box-shadow:0 0 18px rgba(255,45,85,.3),inset 0 0 30px rgba(255,45,85,.08);
  background:linear-gradient(135deg,rgba(160,16,48,.2),rgba(255,159,67,.05)),rgba(20,8,14,.8)}
.boss-banner{font-family:'Rajdhani',sans-serif;text-align:center;border:1px solid rgba(255,45,85,.6);border-radius:12px;
  padding:12px;margin-bottom:12px;background:linear-gradient(135deg,rgba(120,8,30,.35),rgba(10,4,8,.6));
  box-shadow:0 0 18px rgba(255,45,85,.3);letter-spacing:2px}
.boss-banner b{font-size:1.15rem;color:#FF2D55;text-shadow:0 0 12px rgba(255,45,85,.9)}
/* [AJOUT] bouton échauffement + dernière perf */
.warm-btn{background:rgba(255,159,67,.12);border:1px solid rgba(255,159,67,.45);color:#FF9F43;
  border-radius:8px;padding:4px 9px;font-size:.72rem;font-weight:700;white-space:nowrap}
.lastperf{color:var(--blue);font-size:.72rem;margin-top:3px;opacity:.85}
/* [AJOUT] ===== Police calligraphique (mode Mobilité / Vagabond) ===== */
@import url('https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700;800&display=swap');
/* [AJOUT] ===== ÉCRAN DE CHOIX (Streetlifting / Mobilité) ===== */
#chooser{position:fixed;inset:0;z-index:80;display:none;flex-direction:column;
  background:radial-gradient(ellipse at 50% 0%,#15122a,#0a0a0f 70%)}
#chooser.show{display:flex}
body.chooser nav,body.chooser #timerbar{display:none!important}
.choose-half{flex:1;position:relative;overflow:hidden;display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:pointer;text-align:center;padding:24px;
  transition:flex .35s ease}
.choose-half:active{flex:1.25}
.choose-half .em{font-size:3.4rem;filter:drop-shadow(0 0 16px currentColor);margin-bottom:6px}
.choose-half h2{font-size:1.6rem;margin:0;border:none;letter-spacing:1px}
.choose-half p{font-size:.82rem;max-width:300px;margin-top:8px;line-height:1.5;opacity:.85}
.choose-half .go{margin-top:16px;font-weight:800;font-size:.78rem;letter-spacing:2px;
  border:1px solid currentColor;border-radius:99px;padding:8px 18px}
.choose-lift{color:#9D50E0;background:linear-gradient(180deg,rgba(123,47,190,.18),rgba(10,10,15,0))}
.choose-lift h2{font-family:'Rajdhani',sans-serif;color:#cdb4ff;text-shadow:0 0 18px rgba(157,80,224,.6)}
.choose-lift p,.choose-lift .go{color:#b9a6d8}
.choose-zen{color:#a8392c;background:linear-gradient(0deg,rgba(120,30,22,.22),rgba(10,10,15,0))}
.choose-zen h2{font-family:'Shippori Mincho',serif;color:#e7ddc6;text-shadow:0 1px 12px rgba(0,0,0,.7)}
.choose-zen p,.choose-zen .go{color:#c6b89c}
.choose-sep{height:1px;background:linear-gradient(90deg,transparent,#3a3550,transparent);position:relative}
.choose-sep span{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:#0a0a0f;
  color:#5a5a7a;font-size:.7rem;letter-spacing:3px;padding:0 14px;font-weight:700}
/* [AJOUT] ===== THÈME VAGABOND (encre brute · Takehiko Inoue) ===== */
body.zen{--bg:#100e0b;--bg2:#17140f;--bg3:#221c15;--line:#39301f;
  --txt:#ddd4c2;--dim:#9a9079;--faint:#6a6151;
  --acc:#a8392c;--acc2:#c8543f;--good:#9aa56b;--warn:#c2913f;--bad:#c8543f;
  --blue:#7d8a8f;--purple:#b07a5f;--ink:#e2d9c5}
body.zen{background:#0c0a08}
body.zen #bgart{filter:none;opacity:.85;animation:none;background-size:cover;background-position:center top}
body.zen #bgveil{background:linear-gradient(180deg,rgba(12,10,8,.55),rgba(12,10,8,.35) 35%,rgba(12,10,8,.82))}
body.zen .mote{display:none}
body.zen::before{background:radial-gradient(ellipse 80% 55% at 50% 0%,rgba(168,57,44,.14),transparent 70%);animation:none}
body.zen h1,body.zen h2{font-family:'Shippori Mincho',serif;letter-spacing:.5px;color:var(--txt)}
body.zen h2{color:var(--acc2)}
body.zen .card{background:rgba(18,15,11,.74);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
  border-color:var(--line);box-shadow:0 4px 18px rgba(0,0,0,.4)}
body.zen .hero{background:linear-gradient(135deg,rgba(34,26,18,.82),rgba(14,11,8,.78));border-color:var(--line)}
body.zen nav{background:rgba(10,8,6,.96);border-top:1px solid var(--line)}
body.zen nav button.on{color:var(--acc2)}
body.zen .btn{background:var(--acc);color:#f3e9d8;box-shadow:0 0 14px rgba(168,57,44,.3)}
body.zen .btn.ghost{background:var(--bg3);color:var(--txt);border:1px solid var(--line);box-shadow:none}
body.zen .badge{background:var(--bg3);color:var(--dim)}
body.zen .sub,body.zen .muted{color:var(--dim)}
body.zen #timerbar .inner{background:var(--bg2);border-color:var(--acc)}
body.zen #timerbar .t{color:var(--acc2)}
body.zen #timerbar button{background:var(--bg3);color:var(--txt);border-color:var(--line)}
.zen-title{font-family:'Shippori Mincho',serif;font-weight:800}
.ink-quote{font-family:'Shippori Mincho',serif;font-style:italic;color:var(--dim);
  border-left:3px solid var(--acc);padding-left:12px;line-height:1.6;margin:4px 0}
.seal{display:inline-block;font-family:'Shippori Mincho',serif;color:#e2d9c5;background:#a8392c;
  border-radius:4px;padding:1px 6px;font-size:.7rem;font-weight:800;transform:rotate(-4deg);letter-spacing:1px}
/* illustrations à l'encre (trait clair sur fond sombre) */
.pose{width:100%;height:auto;display:block}
.pose .ink{fill:none;stroke:var(--ink,#2a241c);stroke-width:3.4;stroke-linecap:round;stroke-linejoin:round}
.pose .head{fill:var(--ink,#2a241c)}
.pose .enso{fill:none;stroke:var(--acc,#a8392c);stroke-width:2.4;opacity:.5}
.pose .wash{fill:rgba(168,57,44,.08)}
.pose .floor{stroke:var(--faint,#6a6151);stroke-width:2;stroke-linecap:round;opacity:.7}
.ex-card{display:flex;gap:12px;align-items:flex-start}
.ex-card .pose-wrap{width:92px;flex-shrink:0;background:rgba(8,6,4,.55);border:1px solid var(--line);border-radius:12px;padding:4px}
.zone-tag{font-size:.64rem;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--acc2)}
.rt-card{cursor:pointer;position:relative;overflow:hidden}
.rt-card .em{font-size:1.7rem}
.rt-meta{font-size:.72rem;color:var(--dim);margin-top:2px}
.when-tag{font-size:.68rem;font-weight:700;color:var(--acc2);margin-top:4px;letter-spacing:.3px}
.rt-chip{display:inline-block;background:var(--bg3);border:1px solid var(--line);color:var(--txt);
  border-radius:8px;padding:4px 9px;font-size:.72rem;font-weight:700;margin:3px 4px 0 0;cursor:pointer}
.rt-chip.pre{border-color:var(--acc);color:var(--acc2)}
/* [REFONTE] ===== PROGRESSION SOUPLESSE (barres, niveaux, anneau) ===== */
.mob-prog{margin-top:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.mob-prog .rt-meta{flex-shrink:0}
.mob-bar{flex:1;min-width:120px;height:8px;border-radius:6px;background:rgba(8,6,4,.6);
  border:1px solid var(--line);overflow:hidden;margin-top:8px}
.mob-bar span{display:block;height:100%;border-radius:6px;
  background:linear-gradient(90deg,var(--acc),var(--acc2));transition:width .5s ease}
.mob-pct{font-family:'Shippori Mincho',serif;font-weight:800;color:var(--acc2);font-size:1.15rem;flex-shrink:0}
.mob-dots{display:inline-flex;gap:5px;align-items:center;margin-top:5px}
.mob-dots i{width:9px;height:9px;border-radius:50%;background:rgba(120,110,90,.35);
  border:1px solid var(--line);display:inline-block}
.mob-dots i.on{background:var(--acc);border-color:var(--acc2);box-shadow:0 0 6px rgba(168,57,44,.6)}
.mob-cur{font-size:.74rem;font-weight:800;color:var(--acc2);margin-top:4px;letter-spacing:.3px}
.mob-cur.done{color:#c08442}
.mob-lv{border-left:3px solid var(--line)}
.mob-lv.current{border-left-color:var(--acc2);background:rgba(34,26,18,.85)}
.mob-lv.done{border-left-color:#c08442;opacity:.92}
.mob-lv.locked{opacity:.5}
.mob-st{font-size:.66rem;font-weight:800;letter-spacing:.4px;padding:3px 8px;border-radius:7px;white-space:nowrap}
.mob-st.done{color:#e7d9b8;background:rgba(176,125,58,.25);border:1px solid #8a6a32}
.mob-st.cur{color:#f3e9d8;background:var(--acc);border:1px solid var(--acc2)}
.mob-st.lock{color:var(--dim);background:var(--bg3);border:1px solid var(--line)}
.mob-goal{margin-top:7px;font-size:.82rem;font-weight:700;color:var(--txt)}
.mob-pass{margin-top:6px;font-size:.76rem;color:var(--acc2);font-style:italic}
.mob-ring-n{fill:#ece3cf;font-family:'Shippori Mincho',serif;font-weight:800;font-size:1.5rem}
.mob-ring-l{fill:#9a9079;font-size:.5rem;letter-spacing:2px}
.mob-rank{font-family:'Shippori Mincho',serif;font-weight:800;font-size:1.3rem;margin-top:8px;letter-spacing:.5px}
/* [AJOUT] ===== UNIVERS ABDOS (thème Forge · acier-braise) ===== */
body.core{--bg:#0b0c0f;--bg2:#121419;--bg3:#1b1f27;--line:#2b313d;
  --txt:#e9edf2;--dim:#9aa3b2;--faint:#5d6675;
  --acc:#d8551f;--acc2:#ff8a3d;--good:#5fcf80;--warn:#e6a93f;--bad:#ff5d52;
  --blue:#56b3c9;--purple:#c98be0}
body.core{background:#0a0b0e}
body.core #bgart{filter:none;opacity:.9;animation:none;background-size:cover;background-position:center top}
body.core #bgveil{background:linear-gradient(180deg,rgba(10,11,14,.5),rgba(10,11,14,.4) 35%,rgba(10,11,14,.85))}
body.core .mote{display:none}
body.core::before{background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(216,85,31,.16),transparent 70%);animation:none}
body.core h1{color:var(--txt)}
body.core h2{color:var(--acc2)}
body.core .card{background:rgba(18,20,25,.8);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);
  border-color:var(--line);box-shadow:0 4px 18px rgba(0,0,0,.45)}
body.core .hero{background:linear-gradient(135deg,rgba(30,22,14,.85),rgba(14,15,19,.8));border-color:var(--line)}
body.core nav{background:rgba(9,10,13,.96);border-top:1px solid var(--line)}
body.core nav button.on{color:var(--acc2)}
body.core .btn{background:var(--acc);color:#fff;box-shadow:0 0 14px rgba(216,85,31,.35)}
body.core .btn.ghost{background:var(--bg3);color:var(--txt);border:1px solid var(--line);box-shadow:none}
body.core .badge{background:var(--bg3);color:var(--dim)}
body.core .sub,body.core .muted{color:var(--dim)}
.ab-pat{display:inline-block;font-size:.62rem;font-weight:800;letter-spacing:.5px;text-transform:uppercase;padding:3px 9px;border-radius:7px;color:#0a0b0e}
.ab-lvl{display:inline-block;font-size:.62rem;font-weight:800;letter-spacing:.5px;text-transform:uppercase;padding:3px 9px;border-radius:7px;border:1px solid var(--acc);color:var(--acc2);white-space:nowrap}
.ab-dose{display:inline-block;margin-top:8px;font-weight:800;color:var(--acc2);font-size:.95rem}
.ab-num{flex-shrink:0;width:30px;height:30px;border-radius:50%;background:var(--bg3);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--acc2);font-size:.9rem}
.ab-tip{margin-top:8px;font-size:.8rem;color:var(--txt);background:rgba(216,85,31,.08);border-left:3px solid var(--acc);border-radius:0 8px 8px 0;padding:7px 10px;line-height:1.5}
.ab-prog{margin-top:7px;font-size:.76rem;color:var(--dim)}
.ab-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0;display:inline-block}
.choose-core{color:#d8551f;background:linear-gradient(180deg,rgba(216,85,31,.16),rgba(10,10,15,0))}
.choose-core h2{font-family:'Rajdhani',sans-serif;color:#ffb27d;text-shadow:0 0 18px rgba(255,138,61,.5)}
.choose-core p,.choose-core .go{color:#e0b59a}
/* [AJOUT] ===== LECTEUR DE ROUTINE GUIDÉE (ink sombre) ===== */
#zenplay{position:fixed;inset:0;z-index:150;display:none;flex-direction:column;align-items:center;
  justify-content:center;text-align:center;padding:24px;color:#ddd4c2;
  background:radial-gradient(ellipse at 50% 22%,#1d1812,#0b0908 78%)}
#zenplay.show{display:flex}
#zenplay .zp-step{font-family:'Shippori Mincho',serif;color:#9a9079;letter-spacing:2px;font-size:.8rem}
#zenplay .zp-pose{width:min(64vw,240px);margin:8px 0;--ink:#e2d9c5}
#zenplay .zp-name{font-family:'Shippori Mincho',serif;font-weight:800;font-size:1.5rem;color:#ece3cf;margin-top:4px}
#zenplay .zp-how{max-width:380px;font-size:.86rem;color:#b8ad97;line-height:1.55;margin-top:8px}
#zenplay .zp-ring{margin:14px 0 6px}
#zenplay .zp-time{font-family:'Shippori Mincho',serif;font-size:2.2rem;font-weight:800;color:#c8543f}
#zenplay .zp-ctrl{display:flex;gap:14px;margin-top:14px}
#zenplay .zp-ctrl button{width:54px;height:54px;border-radius:50%;background:rgba(34,26,18,.8);
  border:1.5px solid #39301f;color:#ddd4c2;font-size:1.2rem;font-weight:700}
#zenplay .zp-ctrl button.main{width:64px;height:64px;background:#a8392c;color:#f3e9d8;border:none;font-size:1.4rem}
#zenplay .zp-x{position:absolute;top:calc(16px + env(safe-area-inset-top));right:18px;background:none;
  color:#9a9079;font-size:1.5rem;border:none}
@keyframes zenBreath{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
#zenplay.show .zp-pose{animation:zenBreath 5s ease-in-out infinite}
</style>
</head>
<body>
<!-- [AJOUT] fond plein écran (silhouette Jinwoo par défaut, image perso importable dans Profil) -->
<div id="bgart"></div>

<div id="timerbar"><div class="inner">

<div id="zenplay"></div>

<script>

/* ================================================================
   STREETLIFTING TRACKER — Programme 7 semaines, pic en S7
   Toutes les charges sont recalculées depuis tes 1RM (load système

   Données 100% locales (localStorage). Export/import JSON dans Profil.
   ================================================================ */

  squat:{label:'Squat',       short:'SQ', type:'bar', color:'#9D50E0'},

  startDate:null, restHeavy:180, restAcc:90, sound:true, vibrate:true,
  // [AJOUT] seuils de rang (kg, total compé SQ+TR+DI+MU en LEST SEUL, hors poids de corps) — modifiables dans Profil

// Cibles S7 (gain bas / haut, en kg) — issues du programme
const TARGETS = {squat:[7.5,12.5], dl:[5,15], dips:[5,10], pull:[2.5,7.5], mu:[10,15]};

const DAY_NAMES = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];

/* ---- définition du programme ----

         {txt:'...'} texte libre · {rpe:1} charge au RPE · {kg:[a,b]} kg fixes · null

const BLOCK_DAYS = {
  b1:{ // S1–S2 Accumulation
    intro:"Volume élevé, RPE 7→8. S2 = S1 + un cran d'intensité. La 1ʳᵉ ligne est le top set du jour, les suivantes des back-off.",

      {focus:'Dips volume + Muscle-up technique', ex:[

        T('Dips lestés · top set',1,5,{pct:[78,80],lift:'dips'},8,'Série lourde du jour.',1),
        T('Dips lestés · back-off',3,5,{pct:[68,70],lift:'dips'},7,'Descente contrôlée, pas de rebond.',1),

        T('Triceps (extension/barre)',3,12,{rpe:1},7,''),

        T('Gainage',3,'40s',null,null,'')]},
    ]},
  b3:{ // S5–S6 Réalisation
    intro:"Volume minimal, intensité maximale, RPE 9→9.5. Chaque séance lourde = répétition générale du test. Ven/Sam = maintien très léger (RPE ≤ 6), zéro fatigue. S6 = on touche les 1RM actuels.",

function systemTotal(){ return COMP_LIFTS.reduce((a,k)=>a+(+S.settings.rms[k]||0),0); }
function rankIdxOf(total){ let i=0; RANKS.forEach((rk,j)=>{ if(total>=rankMin(j)) i=j; }); return i; }

  const span=next?(rankMin(i+1)-rankMin(i)):0;
  const pct = next&&span>0 ? Math.min(100,Math.max(0,(total-rankMin(i))/span*100)) : 100;
  return {total,cur,next,nextMin:next?rankMin(i+1):null,pct};
}

function calcStreak(){
  const dates=new Set(S.logs.map(l=>l.date));
  let streak=0; const d=new Date();
  if(dates.has(d.toISOString().slice(0,10))) streak++;
  d.setDate(d.getDate()-1);
  for(let i=0;i<730;i++){
    if(!isRestDate(d)){ // [AJOUT] repos flexible : on saute le jour de repos de cette semaine-là
      if(dates.has(d.toISOString().slice(0,10))) streak++;
      else break;
    }
    d.setDate(d.getDate()-1);
  }
  return streak;
}

/* ================== CALCULS ================== */
const r=(v,step)=>Math.round(v/step)*step;
const fmt=v=>(Math.round(v*100)/100).toLocaleString('fr-FR');
function sysRM(lift){ const t=LIFTS[lift].type, rm=S.settings.rms[lift];
  return t==='bar'? rm : S.settings.bw + rm; }
// charge prescrite pour un % donné → {kg: charge affichable, sys, assist:bool, label}
function calcLoad(lift,pct){
  const t=LIFTS[lift].type, sys=sysRM(lift)*pct/100;
  if(t==='bar'){ const kg=r(sys,2.5); return {kg, label:fmt(kg)+' kg'}; }
  const lest=r(sys - S.settings.bw, lift==='mu'?2.5:1.25);
  if(lest<=0) return {kg:0, assist:true, label:'PDC / assist. ~'+fmt(Math.abs(r(sys-S.settings.bw,1.25)))+' kg'};
  return {kg:lest, label:'+'+fmt(lest)+' kg'};
}
function exLoad(ex,wkIdx){ // wkIdx: 0|1 dans le bloc
  const L=ex.load;
  if(!L) return {label:'—'};
  if(L.txt) return {label:L.txt, txt:true};
  if(L.rpe) return {label:'charge au RPE '+ex.rpe, txt:true};
  if(L.kg)  return {kg:L.kg[wkIdx], label:fmt(L.kg[wkIdx])+' kg'};
  return calcLoad(L.lift, L.pct[wkIdx]);
}
// e1RM avec RPE : reps totales possibles = reps + (10 − RPE) ; Epley
function e1rm(w,reps,rpe){
  const tot = reps + Math.max(0, 10-(rpe||10));
  return tot<=1 ? w : w*(1+tot/30);
}
function weekOf(b){ return BLOCKS.find(x=>x.weeks.includes(b)); }
function blockKey(w){ return w<=2?'b1':w<=4?'b2':w<=6?'b3':'b4'; }
function readiness(sleep,fat){ return Math.max(0,Math.min(10, Math.round(sleep*(6-fat)*0.3*10)/10)); }

function currentWeek(){
  const sd=S.settings.startDate; if(!sd) return 1;
  const diff=Math.floor((stripT(new Date())-stripT(new Date(sd)))/(864e5*7))+1;
  return Math.max(1,Math.min(8,diff)); // 8 = cycle terminé
}
function stripT(d){ return new Date(d.getFullYear(),d.getMonth(),d.getDate()).getTime(); }
function todayDow(){ return (new Date().getDay()+6)%7; } // 0=lundi
/* [AJOUT] ---- jour de repos FLEXIBLE : choisi par semaine (défaut dimanche) ---- */
function restDayOf(w){ const v=S.restDays[w]; return (v===undefined||v===null)?6:+v; }
function progDayIdx(w,d){ const rd=restDayOf(w); return d===rd ? null : (d<rd ? d : d-1); } // index dans les 6 séances du bloc
function setRestDay(w,d){ S.restDays[w]=d; save(); render();
  toast('😴 Repos de la S'+w+' placé le '+DAY_NAMES[d]); }
function weekFromDate(dt){ const sd=S.settings.startDate; if(!sd) return 0;
  return Math.floor((stripT(dt)-stripT(new Date(sd)))/(864e5*7))+1; }
function isRestDate(dt){ const w=weekFromDate(dt);
  if(w<1||w>7) return dt.getDay()===0; // hors cycle : dimanche par défaut
  return ((dt.getDay()+6)%7)===restDayOf(w); }

const Timer={ left:0, total:0, run:false, _iv:null,
  start(sec){ this.left=sec; this.total=sec; this.run=true; this._tick();
    clearInterval(this._iv); this._iv=setInterval(()=>this._tick(),250);
    $('timerbar').style.display='flex'; this._last=Date.now(); },
  _tick(){ if(this.run){ const now=Date.now(); this.left-=(now-(this._last||now))/1000; this._last=now;
      if(this.left<=0){ this.left=0; this.done(); } }
    $('timer-t').textContent=Math.floor(this.left/60)+':'+String(Math.ceil(this.left%60)%60).padStart(2,'0');
    $('timer-p').textContent=this.run?'⏸':'▶'; },
  toggle(){ this.run=!this.run; this._last=Date.now(); },
  add(s){ this.left=Math.max(0,this.left+s); this._tick(); },
  stop(){ clearInterval(this._iv); $('timerbar').style.display='none'; this.run=false; },
  done(){ this.stop();
    if(S.settings.vibrate && navigator.vibrate) navigator.vibrate([200,100,200,100,400]);
    if(S.settings.sound){ try{ const ctx=new (window.AudioContext||window.webkitAudioContext)();

        g.gain.setValueAtTime(.25,ctx.currentTime+d); g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d+.2);
        o.start(ctx.currentTime+d); o.stop(ctx.currentTime+d+.22); }); }catch(e){} }
    toast('⏱️ Repos terminé — à toi !'); }
};

function ensureDraft(w,d,day,wkIdx){
  S._drafts=S._drafts||{}; const k=draftKey(w,d);
  if(!S._drafts[k] || S._drafts[k].sig!==sig(day)){
    S._drafts[k]={sig:sig(day), ex:day.ex.map(ex=>{
      const L=exLoad(ex,wkIdx);
      const n=(typeof ex.sets==='number')?ex.sets:1;
      return {sets:Array.from({length:n},()=>({w:L.kg??'', reps:(typeof ex.reps==='number'?ex.reps:''), rpe:ex.rpe||'', done:false}))};
    })};
  }
  return S._drafts[k];
}
function sig(day){ return day.ex.map(e=>e.name+e.sets).join('|'); }

function exerciseHTML(ex,xi,wkIdx,draft,w,d){
  const L=exLoad(ex,wkIdx);
  const isNum=typeof ex.sets==='number';

  const lp=lastPerf(ex.name,w,d);
  if(lp) h+=`<div class="lastperf">↩ Dernière fois (${lp.date.slice(5).replace('-','/')}) : ${lp.sets.map(s=>fmt(s.w)+' kg×'+s.reps+(s.rpe?' @'+s.rpe:'')).join(' · ')}</div>`;
  if(isNum){
    h+=`<div class="set-head"><span></span><span>kg</span><span>reps</span><span>rpe</span><span></span></div><div class="sets">`;

      h+=`<div class="set"><span class="n">${si+1}</span>
      <input type="number" inputmode="decimal" step="0.5" value="${st.w}" placeholder="${L.kg??'—'}"

      <input type="number" inputmode="numeric" value="${st.reps}" placeholder="${typeof ex.reps==='number'?ex.reps:'—'}"
        onchange="setVal(${w},${d},${xi},${si},'reps',this.value)">

function setVal(w,d,xi,si,f,v){ getDraft(w,d).ex[xi].sets[si][f]=v===''?'':+v; save(); }
function ckSet(w,d,xi,si,heavy){
  const st=getDraft(w,d).ex[xi].sets[si]; st.done=!st.done; save();
  if(st.done) Timer.start(heavy?S.settings.restHeavy:S.settings.restAcc);
  render();
}
function plates(total){
  const bar=20, per=(total-bar)/2;
  if(per<0){ Modal.open(`<h2 style="margin-top:0">🏋️ ${fmt(total)} kg</h2><div class="muted">Sous le poids de la barre (20 kg).</div>`); return; }
  let rest=per, out=[];
  [25,20,15,10,5,2.5,1.25,0.5].forEach(p=>{ const n=Math.floor(rest/p+1e-9); if(n){ out.push(`${n} × ${fmt(p)} kg`); rest-=n*p; } });
  Modal.open(`<h2 style="margin-top:0">🏋️ ${fmt(total)} kg — barre 20 kg</h2>
  <div style="font-size:1.05rem;font-weight:700;margin:8px 0">${fmt(per)} kg par côté</div>
  <div class="muted">${out.join(' &nbsp;·&nbsp; ')||'barre vide'}${rest>0.01?` &nbsp;(reste ${fmt(rest)} kg)`:''}</div>

}

    onclick="this.parentNode.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));this.classList.add('on')">${i}</div>`).join('')}</div>
  <label>Notes (sensations, technique, douleurs…)</label><textarea id="f-notes" rows="2"></textarea>
  <button class="btn" onclick="finishSession(${w},${d})">Enregistrer 💾</button>
  <button class="btn ghost" onclick="Modal.close()">Annuler</button>`);

function finishSession(w,d){
  const sleep=+$('f-sleep').value||7;
  const fat=+(document.querySelector('#f-fat .chip.on')?.dataset.v||3);
  const notes=$('f-notes').value;
  const bk=w===7?null:blockKey(w);
  const pi=progDayIdx(w,d); // [AJOUT] index de séance décalé par le jour de repos
  const day = w===7 ? null : BLOCK_DAYS[bk].days[pi];
  const draft=getDraft(w,d)||{ex:[]};
  const names = w===7 ? ['Ouverture','2ᵉ essai','3ᵉ essai / PR'] : day.ex.map(e=>e.name);
  const liftOf = i => w===7 ? WEEK7[pi].lift : (day.ex[i].load&&day.ex[i].load.lift)||null;
  const old=logFor(w,d); if(old) S.logs=S.logs.filter(l=>l!==old);
  const log={id:Date.now().toString(36), date:new Date().toISOString().slice(0,10), week:w, day:d,
    sleep, fatigue:fat, readiness:readiness(sleep,fat), notes,
    ex:draft.ex.map((e,i)=>({name:names[i]||('Exo '+(i+1)), lift:liftOf(i),
      sets:e.sets.filter(s=>s.done&&s.w!==''&&s.reps!=='').map(s=>({w:+s.w,reps:+s.reps,rpe:s.rpe===''?null:+s.rpe}))}))
      .filter(e=>e.sets.length)};
  S.logs.push(log); save(); Modal.close();
  // détection PR (e1RM)
  const prs=detectPRs(log);
  if(prs.length){
    Modal.open(`<h2 style="margin-top:0">🔥 Record estimé !</h2>${prs.map(p=>
      `<div class="card tight"><b>${LIFTS[p.lift].label}</b> — e1RM <b style="color:var(--acc2)">${fmt(p.val)} kg${LIFTS[p.lift].type==='w'?' (lest)':''}</b>
      <span class="muted"> (actuel : ${fmt(S.settings.rms[p.lift])} kg)</span>
      <button class="btn small" style="margin-top:8px" onclick="S.settings.rms['${p.lift}']=${p.val};save();this.textContent='✓ mis à jour';this.disabled=true">Mettre à jour mon 1RM</button></div>`).join('')}
    <button class="btn ghost" onclick="Modal.close();render()">Fermer</button>`);
  } else { toast('Séance enregistrée 💾'); render(); }
}
function detectPRs(log){
  const out=[];
  log.ex.forEach(e=>{ if(!e.lift) return;
    e.sets.forEach(s=>{
      const t=LIFTS[e.lift].type;
      const sysW = t==='bar'? s.w : S.settings.bw+s.w;
      const est = e1rm(sysW, s.reps, s.rpe);
      const estLift = t==='bar'? est : est-S.settings.bw;
      const rounded = r(estLift, 0.5);
      if(rounded > S.settings.rms[e.lift]+0.01){
        const ex=out.find(o=>o.lift===e.lift);
        if(!ex) out.push({lift:e.lift, val:rounded});
        else ex.val=Math.max(ex.val,rounded);
      }
    });
  });
  return out;
}

function refSysRM(k){ const ref=S.cycleRef; if(!ref||!ref.rms) return sysRM(k);
  return LIFTS[k].type==='bar'? ref.rms[k] : ref.bw + ref.rms[k]; }
function bestLiftRM(k){ // meilleur 1RM (lest/barre) atteint sur le cycle : max(1RM actuel, meilleur e1RM loggé)
  let best=S.settings.rms[k];
  S.logs.forEach(l=>l.ex.forEach(e=>{ if(e.lift!==k)return;
    e.sets.forEach(s=>{ const sysW=LIFTS[k].type==='bar'?s.w:S.settings.bw+s.w;
      const est=e1rm(sysW,s.reps,s.rpe); const estL=LIFTS[k].type==='bar'?est:est-S.settings.bw;
      if(estL>best)best=estL; });}));
  return r(best,0.5);
}
function cycleStats(){
  const ref=S.cycleRef||{bw:S.settings.bw,rms:{...S.settings.rms}};
  const per=Object.keys(LIFTS).map(k=>({k, init:ref.rms[k], best:bestLiftRM(k),
    delta:r(bestLiftRM(k)-ref.rms[k],0.5), tgt:TARGETS[k], comp:COMP_LIFTS.includes(k)}));
  const done=S.logs.length, planned=6*Math.max(1,Math.min(currentWeek(),7));
  const avgReady=done? Math.round(S.logs.reduce((a,l)=>a+l.readiness,0)/done*10)/10 : 0;
  const totInit=COMP_LIFTS.reduce((a,k)=>a+(+ref.rms[k]||0),0); // lest seul, hors poids de corps
  const totNow=systemTotal();
  return {per,done,planned,avgReady,totInit,totNow,
    rankInit:RANKS[rankIdxOf(totInit)], rankNow:RANKS[rankIdxOf(totNow)], streak:calcStreak()};
}

function drawCharts(){
  // [AJOUT] total compé estimé séance par séance (running best e1RM par lift, base = baseline du cycle)
  const cr=$('ch-rank');
  if(cr){
    // cumul en LEST SEUL (estL) pour coller au total de rang (hors poids de corps)
    const refRms=(S.cycleRef&&S.cycleRef.rms)||S.settings.rms;
    const best={}; COMP_LIFTS.forEach(k=>best[k]=+refRms[k]||0);
    const pts=[{x:(S.cycleRef&&S.cycleRef.date)||'départ', y:r(COMP_LIFTS.reduce((a,k)=>a+best[k],0),0.5)}];
    [...S.logs].sort((a,b)=>a.date.localeCompare(b.date)).forEach(l=>{
      let touched=false;
      l.ex.forEach(e=>{ if(!e.lift||!COMP_LIFTS.includes(e.lift))return;
        e.sets.forEach(s=>{ const sysW=LIFTS[e.lift].type==='bar'?s.w:S.settings.bw+s.w;
          const est=e1rm(sysW,s.reps,s.rpe); const estL=LIFTS[e.lift].type==='bar'?est:est-S.settings.bw;
          if(estL>best[e.lift]){best[e.lift]=estL; touched=true;} });});
      if(touched) pts.push({x:l.date, y:r(COMP_LIFTS.reduce((a,k)=>a+best[k],0),0.5)});
    });
    drawRankChart(cr,pts);
  }
  const c1=$('ch-e1rm');
  if(c1){
    const pts=[];
    [...S.logs].sort((a,b)=>a.date.localeCompare(b.date)).forEach(l=>{
      let best=0;
      l.ex.forEach(e=>{ if(e.lift!==progLift)return;
        e.sets.forEach(s=>{ const sysW=LIFTS[progLift].type==='bar'?s.w:S.settings.bw+s.w;
          const est=e1rm(sysW,s.reps,s.rpe);
          const estL=LIFTS[progLift].type==='bar'?est:est-S.settings.bw;
          best=Math.max(best,estL); });});
      if(best>0) pts.push({x:l.date, y:r(best,0.5)});
    });
    drawLine(c1, pts, S.settings.rms[progLift], LIFTS[progLift].color);
  }
  const c2=$('ch-ready');
  if(c2){
    const pts=[...S.logs].sort((a,b)=>a.date.localeCompare(b.date)).map(l=>({x:l.date,y:l.readiness}));
    Object.keys(S.daily).sort().forEach(k=>pts.push({x:k,y:S.daily[k].r}));
    pts.sort((a,b)=>a.x.localeCompare(b.x));
    drawBars(c2, pts);
  }
  // [AJOUT] graphes top set : meilleure charge d'une série validée, par séance et par lift
  Object.keys(LIFTS).forEach(k=>{
    const cv=$('ch-top-'+k); if(!cv) return;
    const pts=[];
    [...S.logs].sort((a,b)=>a.date.localeCompare(b.date)).forEach(l=>{
      let best=-Infinity;
      l.ex.forEach(e=>{ if(e.lift!==k)return; e.sets.forEach(s=>{ if(s.w>best)best=s.w; }); });
      if(best>-Infinity) pts.push({x:l.date, y:best});
    });
    drawLine(cv, pts, null, LIFTS[k].color);
  });
}
function drawLine(cv,pts,refLine,color){
  const x=cv.getContext('2d'), W=cv.width, H=cv.height, P=36;
  x.clearRect(0,0,W,H);
  x.font='20px sans-serif'; x.fillStyle='#6a6a92'; // [AJOUT] gris recalé palette SL
  if(!pts.length){ x.fillText('Pas encore de données — enregistre des séances !',P,H/2); return; }
  const ys=pts.map(p=>p.y).concat(refLine?[refLine]:[]);
  let lo=Math.min(...ys), hi=Math.max(...ys); const pad=(hi-lo)*0.15||5; lo-=pad; hi+=pad;
  const px=i=>P+(pts.length===1?(W-2*P)/2:i*(W-2*P)/(pts.length-1));
  const py=v=>H-P-(v-lo)/(hi-lo)*(H-2*P);
  // grid
  x.strokeStyle='#262645'; x.lineWidth=1;
  for(let g=0;g<=3;g++){ const v=lo+(hi-lo)*g/3; x.beginPath(); x.moveTo(P,py(v)); x.lineTo(W-10,py(v)); x.stroke();
    x.fillStyle='#6a6a92'; x.fillText(fmt(r(v,0.5)), 2, py(v)+6); }
  if(refLine){ x.setLineDash([8,6]); x.strokeStyle='#8888aa'; x.beginPath(); x.moveTo(P,py(refLine)); x.lineTo(W-10,py(refLine)); x.stroke(); x.setLineDash([]); }
  x.strokeStyle=color; x.lineWidth=3;
  x.shadowColor=color; x.shadowBlur=10; // [AJOUT] trait néon
  x.beginPath();
  pts.forEach((p,i)=>{ i?x.lineTo(px(i),py(p.y)):x.moveTo(px(0),py(p.y)); }); x.stroke();
  x.shadowBlur=0;
  pts.forEach((p,i)=>{ x.fillStyle=color; x.beginPath(); x.arc(px(i),py(p.y),6,0,7); x.fill();
    x.fillStyle='#e6edf3'; x.font='bold 18px Rajdhani,sans-serif';
    x.fillText(fmt(p.y), px(i)-18, py(p.y)-12); });
  x.fillStyle='#6a6a92'; x.font='16px sans-serif';
  x.fillText(pts[0].x.slice(5), P-10, H-8); if(pts.length>1) x.fillText(pts[pts.length-1].x.slice(5), W-70, H-8);
}
/* [AJOUT] graphe du total compé avec les seuils de rang en lignes colorées */
function drawRankChart(cv,pts){
  const x=cv.getContext('2d'), W=cv.width, H=cv.height, P=46;
  x.clearRect(0,0,W,H);
  x.font='20px sans-serif'; x.fillStyle='#6a6a92';
  if(!pts.length){ x.fillText('Pas encore de données.',P,H/2); return; }
  let lo=Math.min(...pts.map(p=>p.y)), hi=Math.max(...pts.map(p=>p.y));
  const pad=Math.max((hi-lo)*0.25,12); lo-=pad; hi+=pad;
  const px=i=>P+(pts.length===1?(W-2*P)/2:i*(W-2*P)/(pts.length-1));
  const py=v=>H-P-(v-lo)/(hi-lo)*(H-2*P);
  // seuils de rang visibles dans la fenêtre
  RANKS.forEach((rk,i)=>{ const m=rankMin(i); if(i===0||m<lo||m>hi) return;
    x.setLineDash([6,5]); x.strokeStyle=rk.color; x.globalAlpha=.6; x.lineWidth=1.5;
    x.beginPath(); x.moveTo(P,py(m)); x.lineTo(W-8,py(m)); x.stroke();
    x.setLineDash([]); x.globalAlpha=1;
    x.fillStyle=rk.color; x.font='bold 17px Rajdhani,sans-serif'; x.fillText(rk.r,6,py(m)+6);
    x.font='13px Rajdhani,sans-serif'; x.fillText(fmt(m),26,py(m)+6); });
  // courbe néon
  x.strokeStyle='#9D50E0'; x.lineWidth=3.5; x.shadowColor='#9D50E0'; x.shadowBlur=14;
  x.beginPath(); pts.forEach((p,i)=>{ i?x.lineTo(px(i),py(p.y)):x.moveTo(px(0),py(p.y)); }); x.stroke();
  x.shadowBlur=0;
  pts.forEach((p,i)=>{ x.fillStyle='#bc8cff'; x.beginPath(); x.arc(px(i),py(p.y),6,0,7); x.fill(); });
  const last=pts[pts.length-1];
  x.fillStyle='#e6edf3'; x.font='bold 20px Rajdhani,sans-serif';
  x.fillText(fmt(last.y)+' kg', Math.min(px(pts.length-1)-30,W-110), py(last.y)-14);
}
function drawBars(cv,pts){
  const x=cv.getContext('2d'), W=cv.width, H=cv.height, P=30;
  x.clearRect(0,0,W,H);
  x.font='20px sans-serif'; x.fillStyle='#6a6a92';
  if(!pts.length){ x.fillText('Pas encore de données.',P,H/2); return; }
  const n=pts.length, bw=Math.min(40,(W-2*P)/n*0.7);
  pts.forEach((p,i)=>{
    const cx=P+(i+0.5)*(W-2*P)/n, h=(p.y/10)*(H-2*P);
    x.fillStyle=p.y>=8?'#00ff88':p.y>=6?'#d29922':'#ff4d6d';
    x.fillRect(cx-bw/2, H-P-h, bw, h);
  });
  x.strokeStyle='#8888aa'; x.setLineDash([6,5]); x.beginPath();
  const y5=H-P-(5/10)*(H-2*P); x.moveTo(P,y5); x.lineTo(W-P,y5); x.stroke(); x.setLineDash([]);
  x.fillStyle='#6a6a92'; x.fillText('5 = seuil deload', W-190, y5-6);
}

const MU_LADDER=[
  ['3×3 à vide propres','Transition contrôlée, sans kip excessif.'],
  ['+2,5 kg en singles (4×1)','Garder la même qualité de transition sous charge.'],
  ['+5 kg en singles','RPE ≤ 9 sur le single.'],

function muHTML(){
  const bw=S.settings.bw, mus=sysRM('mu');
  const pcts=[[70,'Volume technique pur, beaucoup de reps propres.'],[80,'Technique sous charge modérée.'],
    [85,'Transition proche du réel, peu de reps.'],[Math.round(bw/mus*1000)/10,'Au poids de corps = déjà quasi-maximal. Singles only.']];
  return `<h1>🤸 Protocole Muscle-up</h1>
  <div class="card" style="margin-top:10px;border-color:rgba(248,81,73,.5)">
    <b style="color:var(--bad)">PRINCIPE CLÉ</b>
    <div class="muted" style="margin-top:6px">Avec un 1RM de +${fmt(S.settings.rms.mu)} kg, un muscle-up au poids de corps ≈ <b>${Math.round(bw/mus*100)}% de ton max</b>.

    Le volume technique se fait <b>EN ASSISTANCE</b> (élastique / saut) pour redescendre à 70–85% et faire des reps PROPRES.
    On sépare 3 qualités : explosivité (frais, chargé), technique de transition (assistance, volume), force spécifique (lest).</div></div>
  <div class="card"><b>Les 3 phases à entraîner séparément</b>
  <table style="margin-top:8px"><tr><th>Phase</th><th>Drill</th><th>S×R</th><th>Quand</th></tr>
  <tr><td><b>1. Pull explosif</b></td><td>Traction explosive haute (sternum vers la barre)<div class="ex-note">La hauteur du pull conditionne la transition.</div></td><td>5×3</td><td>Lundi</td></tr>
  <tr><td><b>2. Transition</b></td><td>Négative lente 5 s + transition assistée élastique<div class="ex-note">Passer les coudes DEVANT la barre. C'est le verrou principal.</div></td><td>5×3</td><td>Mercredi</td></tr>
  <tr><td><b>3. Dip de sortie</b></td><td>Straight bar dips<div class="ex-note">Verrouiller la sortie, force en position basse.</div></td><td>4×6</td><td>Mercredi</td></tr>
  </table></div>
  <div class="card"><b>Régler l'assistance (calculé sur tes 1RM)</b>
  <table style="margin-top:8px"><tr><th>Intensité</th><th>Charge effective</th><th>Assistance à retirer</th></tr>
  ${pcts.map(([p,u])=>{ const eff=mus*p/100, ass=bw-eff;
    return `<tr><td><b>${p}%</b></td><td>${fmt(r(eff,0.5))} kg</td>
    <td>${ass>0.2?fmt(r(ass,0.5))+' kg':'—'}<div class="ex-note">${u}</div></td></tr>`;}).join('')}
  </table>
  <div class="ex-note" style="margin-top:8px">L'assistance réelle d'un élastique varie avec l'étirement. Ces kg sont une CIBLE : choisis l'élastique qui te laisse faire 3 reps propres en t'arrêtant à ~2 reps de l'échec (RPE 7–8).</div></div>
  <div class="card"><b>Échelle de progression</b>

}

function exportData(){
  const blob=new Blob([JSON.stringify(S,null,1)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='streetlifting-backup-'+new Date().toISOString().slice(0,10)+'.json'; a.click();
}
function importData(inp){
  const f=inp.files[0]; if(!f)return;
  const rd=new FileReader();
  rd.onload=()=>{ try{ const d=JSON.parse(rd.result);
    if(!d.settings||!d.settings.rms) throw 0;
    localStorage.setItem(KEY,JSON.stringify(d)); S=load(); toast('Import réussi ✓'); render();
  }catch(e){ alert('Fichier invalide.'); } };
  rd.readAsText(f);
}

// ---- progression sauvegardée : S.mob.lvl[ex] = nb de niveaux validés (0..3) ----
function mobAch(k){ return Math.max(0,Math.min(3,(S.mob&&S.mob.lvl&&S.mob.lvl[k])||0)); }
function mobSet(k,n){ if(!S.mob) S.mob={lvl:{}}; if(!S.mob.lvl) S.mob.lvl={}; S.mob.lvl[k]=Math.max(0,Math.min(3,n)); save(); render(); window.scrollTo({top:window.scrollY}); }
function mobGroupKeys(g){ return GROUP_ORDER.includes(g)?Object.keys(MOB_GROUP_OF).filter(k=>MOB_GROUP_OF[k]===g):[]; }
function mobPct(keys){ if(!keys.length) return 0; const a=keys.reduce((s,k)=>s+mobAch(k),0); return Math.round(a/(keys.length*3)*100); }
function mobGroupPct(g){ return mobPct(mobGroupKeys(g)); }
function mobRegionPct(r){ return mobPct(REGIONS[r].groups.reduce((a,g)=>a.concat(mobGroupKeys(g)),[])); }
function mobGlobalPct(){ return mobPct(Object.keys(MOB_GROUP_OF)); }
function mobRank(p){ if(p>=100)return{n:'Maître du Flux 完',c:'#c8543f'}; if(p>=75)return{n:'Corps de Roseau',c:'#c08442'}; if(p>=50)return{n:'Disciple Délié',c:'#b07d3a'}; if(p>=25)return{n:'Apprenti',c:'#9a7d4a'}; return{n:'Corps Raide',c:'#6a6151'}; }
function mobBar(pct){ return `<div class="mob-bar"><span style="width:${pct}%"></span></div>`; }
function mobDots(k){ const a=mobAch(k); return `<span class="mob-dots">${[1,2,3].map(i=>`<i class="${i<=a?'on':''}"></i>`).join('')}</span>`; }

const MTABS=[{id:'upper',ic:'🔼',label:'Haut du corps'},{id:'lower',ic:'🔽',label:'Bas du corps'},{id:'progress',ic:'📊',label:'Progression'},{id:'mode',ic:'⇄',label:'Univers'}];
function mGo(t){ if(t==='mode'){ backToChooser(); return; } mtab=t; mGroup=null; mEx=null; render(); window.scrollTo(0,0); }
function mOpenGroup(g){ mGroup=g; mEx=null; mtab=MOB_GROUPS[g].region; render(); window.scrollTo(0,0); }
function mOpenEx(k){ mEx=k; mGroup=MOB_GROUP_OF[k]; mtab=MOB_GROUPS[mGroup].region; render(); window.scrollTo(0,0); }
function mBack(){ if(mEx){ mEx=null; } else { mGroup=null; } render(); window.scrollTo(0,0); }
function renderMobility(){
  document.body.classList.remove('monarch','core'); document.body.classList.add('zen');
  document.body.classList.remove('chooser'); $('chooser').classList.remove('show');
  const bg=$('bgart'); bg.classList.add('custom');
  bg.style.backgroundImage=`url("data:image/svg+xml;utf8,${BG_ZEN.replace(/\n/g,'')}")`;
  const navTab=(mtab==='upper'||mtab==='lower'||mtab==='progress')?mtab:'upper';
  $('nav').innerHTML=MTABS.map(t=>`<button class="${navTab===t.id&&t.id!=='mode'?'on':''}" onclick="mGo('${t.id}')"><span class="ic">${t.ic}</span>${t.label}</button>`).join('');
  const a=$('app');
  if(mtab==='progress') a.innerHTML=mProgressHTML();
  else if(mEx) a.innerHTML=mExHTML(mEx);
  else if(mGroup) a.innerHTML=mGroupHTML(mGroup);
  else a.innerHTML=mRegionHTML(mtab==='lower'?'lower':'upper');
}

function mExHTML(k){
  const ex=MOB_EX[k], g=MOB_GROUP_OF[k], G=MOB_GROUPS[g], a=mobAch(k), lv=MOB_LV[k], side=ex.bilateral;

              :st==='current'?`<span class="mob-st cur">● En cours</span>`

function mRing(pct,color){
  const C=2*Math.PI*52, off=(C*(1-pct/100)).toFixed(1);
  return `<svg width="124" height="124" viewBox="0 0 120 120" class="mob-ring">
   <circle cx="60" cy="60" r="52" fill="none" stroke="#3a3020" stroke-width="9"/>
   <circle cx="60" cy="60" r="52" fill="none" stroke="${color}" stroke-width="9" stroke-linecap="round" transform="rotate(-90 60 60)" stroke-dasharray="${C.toFixed(1)}" stroke-dashoffset="${off}"/>
   <text x="60" y="56" text-anchor="middle" class="mob-ring-n">${pct}%</text>
   <text x="60" y="76" text-anchor="middle" class="mob-ring-l">MAÎTRISE</text></svg>`;
}

/* ---------- lecteur de routine guidée (minuteur zen) ---------- */
const ZenPlayer={ steps:[], i:0, left:0, total:0, run:false, _iv:null, title:'',
  openEx(k,li){ const ex=MOB_EX[k]; const L=MOB_LV[k]&&MOB_LV[k][li]; if(!ex||!L) return;
    this.title=ex.n+' · Niveau '+(li+1); this.steps=[];
    for(let s=0;s<L.sets;s++){
      if(ex.bilateral){ this.steps.push({ex,dur:L.secs,tag:`Série ${s+1}/${L.sets} · ▷ Côté droit`});
        this.steps.push({ex,dur:L.secs,tag:`Série ${s+1}/${L.sets} · ◁ Côté gauche`}); }
      else this.steps.push({ex,dur:L.secs,tag:`Série ${s+1}/${L.sets} — ${L.g}`}); }
    this.i=0; $('zenplay').classList.add('show'); this._load(); },
  _load(){ const s=this.steps[this.i]; if(!s){ this._finish(); return; }
    this.total=s.dur; this.left=s.dur; this.run=true;
    const C=(2*Math.PI*52).toFixed(1);
    $('zenplay').innerHTML=`<button class="zp-x" onclick="ZenPlayer.close()">✕</button>
      <div class="zp-step">${esc(this.title.toUpperCase())} · ${this.i+1} / ${this.steps.length}</div>
      <div class="zp-pose">${pose(s.ex.pose)}</div>
      <div class="zp-name">${esc(s.ex.n)}</div>
      ${s.tag?`<div class="zp-step" style="margin-top:4px;color:#5b6e4f">${esc(s.tag)}</div>`:''}
      <div class="zp-how">${esc(s.ex.how)}</div>
      <svg class="zp-ring" width="120" height="120" viewBox="0 0 120 120">
        <circle cx="60" cy="60" r="52" fill="none" stroke="#cab98f" stroke-width="6"/>
        <circle id="zp-prog" cx="60" cy="60" r="52" fill="none" stroke="#5b6e4f" stroke-width="6"
          stroke-linecap="round" transform="rotate(-90 60 60)" stroke-dasharray="${C}" stroke-dashoffset="0"/></svg>
      <div class="zp-time" id="zp-time">${this.left}s</div>
      <div class="zp-ctrl">
        <button onclick="ZenPlayer.prev()">‹</button>
        <button class="main" id="zp-pause" onclick="ZenPlayer.toggle()">⏸</button>
        <button onclick="ZenPlayer.next()">›</button></div>`;
    clearInterval(this._iv); this._iv=setInterval(()=>this._tick(),1000); this._paint(); },
  _tick(){ if(this.run){ this.left--; if(this.left<=0){ this._gong();
        if(S.settings.vibrate&&navigator.vibrate) navigator.vibrate(120);
        this.i++; this._load(); return; } } this._paint(); },
  _paint(){ const t=$('zp-time'); if(t) t.textContent=Math.max(0,this.left)+'s';
    const p=$('zp-prog'); if(p){ const C=2*Math.PI*52; p.setAttribute('stroke-dashoffset',(C*(1-this.left/this.total)).toFixed(1)); } },
  toggle(){ this.run=!this.run; const b=$('zp-pause'); if(b) b.textContent=this.run?'⏸':'▶'; },
  prev(){ if(this.i>0){ this.i--; this._load(); } },
  next(){ this.i++; this._load(); },
  _finish(){ clearInterval(this._iv); this.run=false; this._gong();
    $('zenplay').innerHTML=`<button class="zp-x" onclick="ZenPlayer.close()">✕</button>
      <div style="font-size:2.6rem">🗡️</div><div class="zp-name">Entraînement terminé</div>
      <div class="ink-quote" style="margin-top:14px;max-width:340px;text-align:left">« Aujourd'hui encore, tu as forgé ta lame. Demain, tu recommences. »<br><span class="seal">完</span></div>
      <button class="btn" style="max-width:240px;margin-top:20px" onclick="ZenPlayer.close()">Terminer</button>`; },
  close(){ clearInterval(this._iv); this.run=false; const el=$('zenplay'); if(el) el.classList.remove('show'); },
  _gong(){ if(!S.settings.sound) return; try{ const c=new (window.AudioContext||window.webkitAudioContext)();
    const o=c.createOscillator(),g=c.createGain(); o.type='sine'; o.frequency.value=196;
    o.connect(g); g.connect(c.destination); g.gain.setValueAtTime(.0001,c.currentTime);
    g.gain.exponentialRampToValueAtTime(.25,c.currentTime+.05); g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+1.7);
    o.start(); o.stop(c.currentTime+1.8); }catch(e){} }
};

function renderCore(){
  document.body.classList.remove('zen','monarch'); document.body.classList.add('core');
  document.body.classList.remove('chooser'); $('chooser').classList.remove('show');
  const bg=$('bgart'); bg.classList.add('custom');
  bg.style.backgroundImage=`url("data:image/svg+xml;utf8,${BG_CORE.replace(/\n/g,'')}")`;
  const navTab=(ctab==='sessions'||ctab==='method')?ctab:'sessions';
  $('nav').innerHTML=CTABS.map(t=>`<button class="${navTab===t.id&&t.id!=='mode'?'on':''}" onclick="cGo('${t.id}')"><span class="ic">${t.ic}</span>${t.label}</button>`).join('');
  const a=$('app');
  if(ctab==='method') a.innerHTML=corePatternsHTML();
  else if(cSess) a.innerHTML=coreSessionHTML(cSess);
  else a.innerHTML=coreSessionsHTML();
}
function coreSessionsHTML(){
  return `<div class="hero"><h1>🔥 Abdos & Gainage</h1>
   <div class="sub">Le tronc, moteur de tout mouvement de force.</div>
   <div class="muted" style="margin-top:8px">Séances complètes, classées par objectif — pas par semaine. Fais-en 2 à 4 par semaine, après ta séance de force ou un jour à part.</div></div>
   <div class="card tight" onclick="ctab='method';render();window.scrollTo(0,0)" style="cursor:pointer;border-color:var(--acc)">
     <div class="row"><div style="font-size:1.4rem">🧠</div>
       <div class="grow"><b>La méthode d'un coach</b><div class="sub">Comment classer et programmer les abdos →</div></div>
       <div style="color:var(--acc2);font-size:1.3rem">›</div></div></div>
   <h2>Les séances</h2>
   ${AB_SESSIONS.map(s=>`<div class="card rt-card" onclick="cOpen('${s.id}')">
     <div class="row"><div class="em" style="font-size:1.7rem">${s.em}</div>
       <div class="grow"><b style="font-size:1.05rem">${s.name}</b>
         <div class="sub" style="margin-top:2px">${s.focus}</div>
         <div style="margin-top:7px"><span class="ab-lvl">${s.level}</span> <span class="muted" style="font-size:.76rem">· ${s.ex.length} exos · ~${s.min} min</span></div></div>
       <div style="color:var(--acc2);font-size:1.3rem;align-self:center">›</div></div></div>`).join('')}
   <div class="card tight"><div class="muted">⚙️ Un tronc complet = abdos AVANT (flexion), abdos sur les CÔTÉS (obliques) ET bas du dos (extension). Chaque séance ci-dessus est équilibrée dans ce sens.</div></div>`;
}
function coreSessionHTML(id){
  const s=AB_SESSIONS.find(x=>x.id===id); if(!s) return coreSessionsHTML();
  return `<div class="row" style="margin:2px 0 10px"><button class="btn ghost small" onclick="cBack()">‹ Séances</button></div>
   <div class="hero"><div class="row"><div class="em" style="font-size:2rem">${s.em}</div>
     <div class="grow"><h1 style="font-size:1.3rem">${s.name}</h1><div class="sub">${s.focus}</div></div></div>
     <div style="margin-top:8px"><span class="ab-lvl">${s.level}</span> <span class="muted" style="font-size:.78rem">· ${s.ex.length} exercices · ~${s.min} min</span></div>
     <div class="muted" style="margin-top:8px">${s.intro}</div></div>
   ${s.ex.map((e,i)=>{ const P=AB_PATTERNS[e.pat];
     return `<div class="card"><div class="row" style="align-items:flex-start;gap:10px">
       <div class="ab-num">${i+1}</div>
       <div class="grow"><b style="font-size:1.02rem">${e.n}</b>
         <div style="margin-top:5px"><span class="ab-pat" style="background:${P.c}">${P.n}</span></div>
         <div class="ab-dose">📋 ${e.dose}</div>
         <div class="muted" style="margin-top:6px">${e.how}</div>
         <div class="ab-tip">💡 ${e.tip}</div>
         <div class="ab-prog">📈 Progression : ${e.prog}</div></div></div></div>`; }).join('')}
   <div class="card tight"><div class="muted">🫁 Repos 45–90 s entre les séries. Cherche la tension dans le muscle visé, jamais dans le bas du dos. Qualité avant quantité.</div></div>`;
}
function corePatternsHTML(){
  return `<div class="hero"><h1>🧠 La méthode</h1>
   <div class="sub">Comment un coach de streetlifting classe et programme le travail du tronc.</div></div>
   <div class="card"><b>Pourquoi des abdos forts ?</b>
     <div class="muted" style="margin-top:6px">En streetlifting, le tronc transmet la force entre le haut et le bas du corps. Un gainage solide = plus de kilos au squat et au deadlift, un muscle-up plus propre, et une colonne protégée. On ne travaille pas les abdos « pour le show » mais pour transférer la force.</div></div>
   <h2>Les 4 schémas de mouvement</h2>
   ${Object.values(AB_PATTERNS).map(P=>`<div class="card"><div class="row" style="gap:9px;align-items:center"><span class="ab-dot" style="background:${P.c}"></span><b>${P.n}</b></div>
     <div class="muted" style="margin-top:6px">${P.d}</div></div>`).join('')}
   <h2>Comment programmer</h2>
   <div class="card"><div class="muted" style="line-height:1.6">
     <b style="color:var(--acc2)">Fréquence :</b> 2 à 4 séances/semaine. Le tronc récupère vite.<br><br>
     <b style="color:var(--acc2)">Quand :</b> APRÈS ta séance de force (jamais avant — un tronc fatigué rend le squat et le deadlift moins sûrs), ou sur un jour léger / de repos.<br><br>
     <b style="color:var(--acc2)">Progression :</b> ajoute des répétitions ou du temps de tenue, puis passe à la variante plus dure (ligne « Progression » de chaque exo). La surcharge progressive s'applique aussi aux abdos.<br><br>
     <b style="color:var(--acc2)">Équilibre :</b> ne fais pas QUE des crunchs. Mixe flexion, obliques/rotation, anti-extension et un peu d'extension (bas du dos).</div></div>
   <div class="card tight"><div class="muted">⭐ Conseil d'expert : 3 séries propres et lentes battent 10 séries bâclées. Le tronc répond au contrôle, pas à l'élan.</div></div>`;
}
